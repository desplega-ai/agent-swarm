name: Docker Build + Publish + Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "Dockerfile.worker"
      - "docker-entrypoint.sh"
      - "api-entrypoint.sh"
      - "package.json"
      - "bun.lock*"
      - "bunfig.toml"
      - ".dockerignore"
      - "ui/package.json"
      - "templates-ui/package.json"
      - "evals/package.json"
      - "tsconfig.json"
      - "scripts/**"
      - "charts/agent-swarm/Chart.yaml"
      - "templates/**"
      - "plugin/**"
      - "deploy/**"
      - ".github/workflows/docker-and-deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check chart version sync
        run: bun run sync-chart-version --check

      - name: Check for version change
        id: check
        run: |
          NEW_VERSION=$(jq -r '.version' package.json)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          OLD_VERSION=$(git show ${{ github.event.before }}:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
          if [ "$OLD_VERSION" != "$NEW_VERSION" ] && [ -n "$OLD_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "::notice::Version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $NEW_VERSION"
          fi

  build-and-push-server-amd64:
    runs-on: ubuntu-latest
    needs: [detect-version-change]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=server-amd64
          cache-to: type=gha,scope=server-amd64,mode=max

  build-and-push-server-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [detect-version-change]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=server-arm64
          cache-to: type=gha,scope=server-arm64,mode=max

  merge-server:
    runs-on: ubuntu-latest
    needs:
      - detect-version-change
      - build-and-push-server-amd64
      - build-and-push-server-arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect-version-change.outputs.version }},enable=${{ needs.detect-version-change.outputs.version_changed == 'true' }}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push-server-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push-server-arm64.outputs.digest }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  build-and-push-worker-amd64:
    runs-on: ubuntu-latest
    needs: [detect-version-change]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.worker
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=worker-amd64
          cache-to: type=gha,scope=worker-amd64,mode=max

  build-and-push-worker-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [detect-version-change]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.worker
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=worker-arm64
          cache-to: type=gha,scope=worker-arm64,mode=max

  merge-worker:
    runs-on: ubuntu-latest
    needs:
      - detect-version-change
      - build-and-push-worker-amd64
      - build-and-push-worker-arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect-version-change.outputs.version }},enable=${{ needs.detect-version-change.outputs.version_changed == 'true' }}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker@${{ needs.build-and-push-worker-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker@${{ needs.build-and-push-worker-arm64.outputs.digest }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: agent-swarm-deploy
      cancel-in-progress: false

    needs:
      - merge-server
      - merge-worker

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5

      - name: Check running commit is main tip
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin main:refs/remotes/origin/main
          main_tip="$(git rev-parse origin/main)"

          echo "Running commit: ${GITHUB_SHA}"
          echo "Current origin/main: ${main_tip}"

          if [ "${GITHUB_SHA}" = "${main_tip}" ]; then
            echo "is_tip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Running commit is still the main tip; proceeding with deploy"
          else
            echo "is_tip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy because a newer main commit is available: ${main_tip}"
          fi

      - name: Deploy Agent Swarm
        if: steps.guard.outputs.is_tip == 'true'
        uses: tarasyarema/dokploy-deploy-action@main
        with:
          deployment_type: compose
          compose_id: u-iCRBK0Ta-pOedSaTjqc
          compose_name: swarm-new-22yjmi
          dokploy_url: https://app.dokploy.com
          auth_token: ${{ secrets.DOKPLOY_TOKEN }}
          wait_for_completion: true

  notify-image-release:
    name: Notify Swarm Cloud image release
    runs-on: ubuntu-latest
    needs:
      - detect-version-change
      - merge-server
      - merge-worker
    if: github.repository == 'desplega-ai/agent-swarm' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      SWARM_CLOUD_BASE_URL: ${{ secrets.SWARM_CLOUD_BASE_URL }}
      IMAGE_RELEASE_INTAKE_SECRET: ${{ secrets.IMAGE_RELEASE_INTAKE_SECRET }}
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Post manifest digests to Swarm Cloud
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          GIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ needs.detect-version-change.outputs.version_changed == 'true' && needs.detect-version-change.outputs.version || github.ref_name }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "$IMAGE_RELEASE_INTAKE_SECRET" ]; then
            echo "::warning::IMAGE_RELEASE_INTAKE_SECRET is not configured; skipping Swarm Cloud image-release callback"
            exit 0
          fi

          if [ -z "$SWARM_CLOUD_BASE_URL" ]; then
            echo "::warning::SWARM_CLOUD_BASE_URL is not configured; skipping Swarm Cloud image-release callback"
            exit 0
          fi

          api_digest="$(docker buildx imagetools inspect "${API_IMAGE}:latest" --format '{{json .Manifest.Digest}}' | jq -r .)"
          worker_digest="$(docker buildx imagetools inspect "${WORKER_IMAGE}:latest" --format '{{json .Manifest.Digest}}' | jq -r .)"

          if ! [[ "$api_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Unexpected API manifest digest: $api_digest"
            exit 1
          fi

          if ! [[ "$worker_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Unexpected worker manifest digest: $worker_digest"
            exit 1
          fi

          api_ref="${API_IMAGE}:latest@${api_digest}"
          worker_ref="${WORKER_IMAGE}:latest@${worker_digest}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --arg source "agent-swarm-github-actions" \
            --arg repository "$REPOSITORY" \
            --arg gitSha "$GIT_SHA" \
            --arg version "$VERSION" \
            --arg workflowRunId "$WORKFLOW_RUN_ID" \
            --arg workflowRunUrl "$WORKFLOW_RUN_URL" \
            --arg publishedAt "$published_at" \
            --arg api "$api_ref" \
            --arg worker "$worker_ref" \
            '{
              source: $source,
              repository: $repository,
              gitSha: $gitSha,
              version: $version,
              workflowRunId: $workflowRunId,
              workflowRunUrl: $workflowRunUrl,
              publishedAt: $publishedAt,
              images: {
                api: $api,
                worker: $worker
              }
            }' > payload.json

          signature="$(openssl dgst -sha256 -hmac "$IMAGE_RELEASE_INTAKE_SECRET" payload.json | awk '{print $NF}')"

          echo "::notice::Posting image release for ${REPOSITORY}@${GIT_SHA}"
          echo "::notice::Image release version: ${VERSION}"
          echo "::notice::API image: ${api_ref}"
          echo "::notice::Worker image: ${worker_ref}"
          echo "::notice::Workflow run: ${WORKFLOW_RUN_URL}"

          http_status="$(
            curl --silent --show-error --location \
              --output response.json \
              --write-out "%{http_code}" \
              --header "content-type: application/json" \
              --header "x-signature: sha256=${signature}" \
              --data-binary @payload.json \
              "${SWARM_CLOUD_BASE_URL%/}/image-releases"
          )"

          echo "Swarm Cloud image-release response (${http_status}):"
          cat response.json
          echo

          if [ "$http_status" != "200" ] && [ "$http_status" != "201" ]; then
            echo "::error::Swarm Cloud image-release callback failed with HTTP ${http_status}"
            exit 1
          fi

  publish-e2b-templates:
    name: Publish E2B templates
    runs-on: ubuntu-latest
    needs:
      - detect-version-change
      - merge-server
      - merge-worker
    if: needs.detect-version-change.outputs.version_changed == 'true'
    env:
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      VERSION: ${{ needs.detect-version-change.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check E2B credentials
        run: |
          test -n "$E2B_API_KEY" || { echo "::error::Missing E2B_API_KEY secret"; exit 1; }

      - name: Build and publish release templates
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
        run: |
          VERSION_SLUG="${VERSION//./-}"

          API_VERSION_TEMPLATE="agent-swarm-api-${VERSION_SLUG}"
          API_LATEST_TEMPLATE="agent-swarm-api-latest"
          WORKER_VERSION_TEMPLATE="agent-swarm-worker-${VERSION_SLUG}"
          WORKER_LATEST_TEMPLATE="agent-swarm-worker-latest"

          bun run src/cli.tsx e2b build-template \
            --role api \
            --source image \
            --template "$API_VERSION_TEMPLATE" \
            --image "${API_IMAGE}:${VERSION}"
          bun run src/cli.tsx e2b publish-template "$API_VERSION_TEMPLATE"

          # The -latest templates MUST build from the immutable :${VERSION} ref,
          # not :latest. E2B's builder caches the fromImage base layer by image
          # reference string; a mutable :latest ref never changes, so rebuilds
          # hit the cache forever and the template stays frozen at whatever
          # image was pulled on the FIRST build (this pinned the -latest
          # templates to v1.85 from 2026-05-27 until v1.97).
          bun run src/cli.tsx e2b build-template \
            --role api \
            --source image \
            --template "$API_LATEST_TEMPLATE" \
            --image "${API_IMAGE}:${VERSION}"
          bun run src/cli.tsx e2b publish-template "$API_LATEST_TEMPLATE"

          bun run src/cli.tsx e2b build-template \
            --role worker \
            --source image \
            --template "$WORKER_VERSION_TEMPLATE" \
            --image "${WORKER_IMAGE}:${VERSION}"
          bun run src/cli.tsx e2b publish-template "$WORKER_VERSION_TEMPLATE"

          bun run src/cli.tsx e2b build-template \
            --role worker \
            --source image \
            --template "$WORKER_LATEST_TEMPLATE" \
            --image "${WORKER_IMAGE}:${VERSION}"
          bun run src/cli.tsx e2b publish-template "$WORKER_LATEST_TEMPLATE"

  create-git-tag:
    runs-on: ubuntu-latest
    needs: [detect-version-change]
    if: needs.detect-version-change.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create and push tag
        env:
          VERSION: ${{ needs.detect-version-change.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::Created tag $TAG"
          fi

  publish-npm:
    runs-on: ubuntu-latest
    needs: [detect-version-change]
    if: needs.detect-version-change.outputs.version_changed == 'true'
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if already published
        id: check
        env:
          VERSION: ${{ needs.detect-version-change.outputs.version }}
        run: |
          if npm view "@desplega.ai/agent-swarm@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Version ${VERSION} already on npm, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    needs: [detect-version-change, create-git-tag, publish-npm, publish-e2b-templates]
    if: needs.detect-version-change.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-version-change.outputs.version }}
        run: |
          TAG="v${VERSION}"
          VERSION_SLUG="${VERSION//./-}"
          cat > /tmp/release-notes.md <<EOF
          ## Install & Run

          **npm:**
          \`\`\`bash
          npx @desplega.ai/agent-swarm@${VERSION}
          # or install globally
          npm i -g @desplega.ai/agent-swarm@${VERSION}
          \`\`\`

          **bun:**
          \`\`\`bash
          bunx @desplega.ai/agent-swarm@${VERSION}
          # or install globally
          bun i -g @desplega.ai/agent-swarm@${VERSION}
          \`\`\`

          **Docker:**
          \`\`\`bash
          # Server
          docker pull ghcr.io/desplega-ai/agent-swarm:${VERSION}
          # Worker
          docker pull ghcr.io/desplega-ai/agent-swarm-worker:${VERSION}
          \`\`\`

          **E2B templates:**
          \`\`\`bash
          # API
          agent-swarm-api-${VERSION_SLUG}
          agent-swarm-api-latest

          # Worker / lead runtime
          agent-swarm-worker-${VERSION_SLUG}
          agent-swarm-worker-latest
          \`\`\`

          ---
          EOF
          sed -i 's/^          //' /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --generate-notes \
            --verify-tag
