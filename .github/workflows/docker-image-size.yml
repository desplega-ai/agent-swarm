name: Docker Image Size

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "Dockerfile"
      - "Dockerfile.worker"
      - "docker-entrypoint.sh"
      - "api-entrypoint.sh"
      - "package.json"
      - "bun.lock*"
      - "templates/**"
      - "plugin/**"
      - ".github/workflows/docker-image-size.yml"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "Dockerfile.worker"
      - "docker-entrypoint.sh"
      - "api-entrypoint.sh"
      - "package.json"
      - "bun.lock*"
      - "templates/**"
      - "plugin/**"
      - ".github/workflows/docker-image-size.yml"
  workflow_dispatch:

concurrency:
  group: docker-image-size-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_SIZE_THRESHOLD_PERCENT: "10"
  IMAGE_SIZE_THRESHOLD_MB: "50"
  IMAGE_SIZE_PING_USER: "@tarasyarema"

jobs:
  pr-size-report:
    name: PR Image Size Report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Free runner disk space
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/microsoft \
            /opt/pipx
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base images
        working-directory: base
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-api:base \
            --file Dockerfile \
            --cache-from type=gha,scope=image-size-api \
            --cache-to type=gha,scope=image-size-api,mode=max,ignore-error=true \
            .
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-worker:base \
            --file Dockerfile.worker \
            --cache-from type=gha,scope=image-size-worker \
            --cache-to type=gha,scope=image-size-worker,mode=max,ignore-error=true \
            .

      - name: Build PR images
        working-directory: head
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-api:head \
            --file Dockerfile \
            --cache-from type=gha,scope=image-size-api \
            --cache-to type=gha,scope=image-size-api,mode=max,ignore-error=true \
            .
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-worker:head \
            --file Dockerfile.worker \
            --cache-from type=gha,scope=image-size-worker \
            --cache-to type=gha,scope=image-size-worker,mode=max,ignore-error=true \
            .

      - name: Generate image size comment
        working-directory: head
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/ci/compare-image-sizes.mjs \
            --mode pr \
            --comment-file ../image-size-comment.md

      - name: Update sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docker-image-size
          path: image-size-comment.md

  main-history:
    name: Record Main Image Sizes
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/microsoft \
            /opt/pipx
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build current images
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-api:head \
            --file Dockerfile \
            --cache-from type=gha,scope=image-size-api \
            --cache-to type=gha,scope=image-size-api,mode=max,ignore-error=true \
            .
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag agent-swarm-size-worker:head \
            --file Dockerfile.worker \
            --cache-from type=gha,scope=image-size-worker \
            --cache-to type=gha,scope=image-size-worker,mode=max,ignore-error=true \
            .

      - name: Append history record
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          node scripts/ci/compare-image-sizes.mjs \
            --mode history \
            --history-file .github/image-size-history.jsonl

      - name: Commit image size history
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: record docker image sizes"
          file_pattern: .github/image-size-history.jsonl
