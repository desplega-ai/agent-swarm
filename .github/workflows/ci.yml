name: CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/swarm/src/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock*"
      - "bunfig.toml"
      - "apps/ui/package.json"
      - "apps/templates-ui/package.json"
      - "apps/evals/package.json"
      - "konsistent.json"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome linter
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run tsc:check

      - name: Run structural consistency lint
        continue-on-error: true
        env:
          KONSISTENT_NO_UPDATE_CHECK: "true"
        run: bun run lint:structure

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        # apps/evals/ excluded from the root run via bunfig.toml pathIgnorePatterns
        # (separate bun package with its own deps + CI test step).
        run: bun test --timeout 10000
