apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agent-swarm.fullname" . }}-test-api"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: busybox:1.36
      command:
        - sh
        - -c
        - 'wget -qO- http://{{ include "agent-swarm.fullname" . }}-api:{{ .Values.api.port }}{{ .Values.api.healthCheck.path }}'
