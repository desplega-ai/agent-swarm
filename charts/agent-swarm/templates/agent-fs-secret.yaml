{{- if and .Values.agentFs.enabled (not .Values.agentFs.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-swarm.agentFsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-fs
type: Opaque
stringData:
  {{- if .Values.agentFs.apiKey }}
  API_AGENT_FS_API_KEY: {{ .Values.agentFs.apiKey | quote }}
  {{- end }}
  S3_ACCESS_KEY_ID: {{ .Values.agentFs.s3.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.agentFs.s3.secretAccessKey | quote }}
  {{- if .Values.agentFs.s3.endpoint }}
  S3_ENDPOINT: {{ .Values.agentFs.s3.endpoint | quote }}
  {{- end }}
  {{- if .Values.agentFs.s3.publicEndpoint }}
  S3_PUBLIC_ENDPOINT: {{ .Values.agentFs.s3.publicEndpoint | quote }}
  {{- end }}
  {{- if .Values.agentFs.s3.region }}
  S3_REGION: {{ .Values.agentFs.s3.region | quote }}
  {{- end }}
  {{- if .Values.agentFs.s3.provider }}
  S3_PROVIDER: {{ .Values.agentFs.s3.provider | quote }}
  {{- end }}
  {{- if .Values.agentFs.embedding.apiKey }}
  EMBEDDING_API_KEY: {{ .Values.agentFs.embedding.apiKey | quote }}
  {{- end }}
{{- end }}
