{{/*
Inline-credentials Secret. Only rendered when the operator did NOT provide
auth.existingSecret. Each key is sourced from values.auth.*; empty values
result in empty Secret entries, which is fine for optional features (the
consuming code skips them).

API_KEY is the one required value — without it the API would accept
unauthenticated requests, which is never what you want even in dev. Fail
early with a clear message rather than silently shipping an open API.
*/}}
{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.apiKey }}
  {{- fail "auth.apiKey is required when auth.existingSecret is unset. Generate one with: openssl rand -hex 32" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-swarm.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.auth.apiKey | quote }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.auth.claudeCodeOauthToken | quote }}
  ANTHROPIC_API_KEY: {{ .Values.auth.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.auth.openaiApiKey | quote }}
  OPENROUTER_API_KEY: {{ .Values.auth.openrouterApiKey | quote }}
  GITHUB_TOKEN: {{ .Values.auth.githubToken | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.auth.githubWebhookSecret | quote }}
  SLACK_BOT_TOKEN: {{ .Values.auth.slackBotToken | quote }}
  SLACK_APP_TOKEN: {{ .Values.auth.slackAppToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.auth.slackSigningSecret | quote }}
  SECRETS_ENCRYPTION_KEY: {{ .Values.auth.secretsEncryptionKey | quote }}
{{- end }}
