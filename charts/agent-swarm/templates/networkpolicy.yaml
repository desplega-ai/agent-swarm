{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent-swarm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent-swarm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-release traffic between pool pods, the API, and agent-fs.
    - from:
        - podSelector:
            matchLabels:
              {{- include "agent-swarm.selectorLabels" . | nindent 14 }}
  egress:
    # DNS to kube-system. Required for any service-name resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-release traffic (pool ↔ api ↔ agent-fs).
    - to:
        - podSelector:
            matchLabels:
              {{- include "agent-swarm.selectorLabels" . | nindent 14 }}
    # Operator-supplied egress rules. Add provider endpoints, registries,
    # external trackers, etc. — the chart ships zero outbound allowance
    # because the right list depends on which providers and integrations
    # the swarm uses. Example:
    #   networkPolicy:
    #     extraEgress:
    #       - to: [{ ipBlock: { cidr: 0.0.0.0/0 } }]
    #         ports:
    #           - { protocol: TCP, port: 443 }
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
