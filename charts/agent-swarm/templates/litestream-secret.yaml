{{- if and .Values.litestream.enabled (not .Values.litestream.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-swarm.litestreamSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: litestream
type: Opaque
stringData:
  LITESTREAM_ACCESS_KEY_ID: {{ .Values.litestream.s3.accessKeyId | quote }}
  LITESTREAM_SECRET_ACCESS_KEY: {{ .Values.litestream.s3.secretAccessKey | quote }}
{{- end }}
