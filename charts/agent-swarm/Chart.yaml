apiVersion: v2
name: agent-swarm
description: Multi-agent orchestration for Claude Code, Codex, Gemini CLI, and other AI coding assistants
type: application
# Required Kubernetes version. networking.k8s.io/v1 Ingress and modern
# StatefulSet semantics assume 1.25+.
kubeVersion: ">=1.25.0-0"
# Chart version — bumped when the chart itself changes. Independent of appVersion.
version: 0.1.0
# Application version — must match package.json.version. Bump it by hand
# whenever you bump package.json; CI rejects PRs where the two values drift.
appVersion: "1.74.4"
home: https://github.com/desplega-ai/agent-swarm
sources:
  - https://github.com/desplega-ai/agent-swarm
keywords:
  - agents
  - ai
  - claude
  - codex
  - llm
  - orchestration
  - mcp
maintainers:
  - name: desplega.sh
    email: contact@desplega.sh
    url: https://github.com/desplega-ai
icon: https://raw.githubusercontent.com/desplega-ai/agent-swarm/main/assets/logo.png
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/desplega-ai/agent-swarm
    - name: Documentation
      url: https://github.com/desplega-ai/agent-swarm/blob/main/DEPLOYMENT.md
  artifacthub.io/category: ai-machine-learning
