# Pre-push hooks matching CI merge gate checks.
# See .github/workflows/merge-gate.yml — the `detect-changes` job gates each
# downstream job behind a per-domain path filter. The `files` regexes below
# mirror those filters so a push only runs a hook when files it actually
# validates changed. Meta-only pushes (workflows, docs, runbooks, this config)
# match nothing and run no hooks — same as CI skipping every gated job.
#
# Mechanics: with `always_run` unset (default false) + `pass_filenames = false`,
# prek runs the whole-project entry once, but only if a pushed file matches
# `files`. Do NOT use `always_run = true` here — it bypasses the file gate.
default_install_hook_types = ["pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "biome-lint"
name = "Biome lint"
language = "system"
entry = "bun run lint"
# CI "lint" domain: biome runs on apps/swarm/src/ + apps/evals/; config + lockfile + tsconfig.
files = '^(apps/swarm/src/|apps/evals/|package\.json$|bun\.lock|bunfig\.toml$|tsconfig\.json$|biome\.json$)'
pass_filenames = false
stages = ["pre-push"]
fail_fast = true

[[repos.hooks]]
id = "typecheck"
name = "TypeScript type check"
language = "system"
entry = "bun run tsc:check"
# Same CI "lint" domain (tsc:check is bundled in the lint-and-typecheck job).
files = '^(apps/swarm/src/|apps/evals/|package\.json$|bun\.lock|bunfig\.toml$|tsconfig\.json$|biome\.json$)'
pass_filenames = false
stages = ["pre-push"]
fail_fast = true

[[repos.hooks]]
id = "test"
name = "Unit tests"
language = "system"
entry = "bun test"
# CI "test" domain: src/ + scripts tests import + lockfile/tsconfig.
files = '^(src/|scripts/|package\.json$|bun\.lock|tsconfig\.json$)'
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "db-boundary"
name = "Worker/API DB boundary check"
language = "system"
entry = "bash scripts/check-db-boundary.sh"
# Validates src/ import boundaries; also re-run if the check script itself changes.
files = '^(src/|scripts/check-db-boundary\.sh$)'
pass_filenames = false
stages = ["pre-push"]
fail_fast = true

[[repos.hooks]]
id = "pi-skills-freshness"
name = "Pi-skills freshness check"
language = "system"
entry = "bash -c 'bun run build:pi-skills && test -z \"$(git diff --name-only plugin/pi-skills/)\"'"
# CI "pi_skills" domain: generator inputs + generated outputs.
files = '^(plugin/commands/|plugin/pi-skills/|plugin/build-pi-skills\.ts$)'
pass_filenames = false
stages = ["pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ui-lint"
name = "UI Biome lint"
language = "system"
entry = "bash -c 'cd apps/ui && bun run lint'"
files = "^apps/ui/"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "ui-typecheck"
name = "UI TypeScript type check"
language = "system"
entry = "bash -c 'cd apps/ui && bunx tsc -b'"
files = "^apps/ui/"
pass_filenames = false
stages = ["pre-push"]
