<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Session Logs · Compare side-by-side</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./session-logs/demo-shared.css" />
<style>
html,body{height:100%;overflow:hidden}
.chrome{flex-wrap:wrap}
.chrome .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted-foreground);text-decoration:none}
.chrome .back:hover{color:var(--foreground)}
.chrome .back svg{width:15px;height:15px}
.picker{display:inline-flex;align-items:center;gap:7px}
.picker .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-foreground)}
.picker .chips{display:inline-flex;background:var(--muted);border:1px solid var(--border);border-radius:8px;padding:2px}
.picker button{font:inherit;font-size:12px;font-weight:600;border:none;background:none;color:var(--muted-foreground);padding:4px 10px;border-radius:6px;cursor:pointer;transition:color .12s,background .12s}
.picker button[aria-pressed=true]{background:var(--card);color:var(--foreground);box-shadow:0 1px 2px oklch(0 0 0 /.08)}

.grid{display:flex;align-items:center;justify-content:center;gap:14px;height:calc(100dvh - 53px);padding:0 16px;overflow:auto}
.pane{flex:1 1 0;min-width:320px;max-width:540px;height:min(84vh,800px);display:flex;flex-direction:column;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:var(--card)}
.pane.hidden{display:none}
.pane-head{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border);background:color-mix(in oklch,var(--muted) 24%,var(--card))}
.pane-head .letter{flex:none;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:700;font-size:12px;background:color-mix(in oklch,var(--primary) 14%,transparent);color:var(--primary)}
.pane.feat .pane-head .letter{background:var(--primary);color:oklch(0.985 0 0)}
.pane-head h3{margin:0;font-size:13px;font-weight:600;letter-spacing:-.01em}
.pane-head .tag{font-size:11px;color:var(--muted-foreground)}
.pane.feat .pane-head .tag{color:var(--primary);font-weight:600}
.pane-head .full{margin-left:auto;color:var(--muted-foreground);display:inline-flex;text-decoration:none}
.pane-head .full:hover{color:var(--primary)}
.pane-head .full svg{width:14px;height:14px}
.pane iframe{flex:1;width:100%;border:0;background:var(--background)}

@media (max-width:760px){
  html,body{overflow:auto}
  .grid{flex-direction:column;align-items:stretch;height:auto;padding:14px}
  .pane{height:80vh;max-width:none}
}
</style>
</head>
<body>
<div class="chrome">
  <a class="back" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Gallery</a>
  <span class="badge">Compare</span>
  <div class="picker" id="picker"><span class="lbl">Show</span><div class="chips" id="chips"></div></div>
  <div class="sp"></div>
  <div class="controls">
    <button class="btn icon-btn" id="c-play" title="Auto-play all" aria-label="Auto-play all"></button>
    <select id="c-speed" class="speed" aria-label="Auto-play speed (messages per second)"><option value="1">1/s</option><option value="2" selected>2/s</option><option value="4">4/s</option><option value="8">8/s</option></select>
    <button class="btn" id="c-next" title="Stream the next event in all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg> Push next</button>
    <button class="btn" id="c-all" title="Render everything in all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m7 6 5 5 5-5M7 13l5 5 5-5"/></svg> Load all</button>
    <button class="btn icon-btn" id="c-reset" title="Reset all" aria-label="Reset all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></button>
    <button class="btn icon-btn" id="theme" title="Toggle theme" aria-label="Toggle theme"></button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const OPTS=[
  {k:'d',name:'Spine + Stream',tag:'★ A × C',src:'session-logs/option-d-hybrid/index.html',feat:true},
  {k:'a',name:'Timeline Spine',tag:'calm',src:'session-logs/option-a-timeline-spine/index.html'},
  {k:'b',name:'Grouped Turns',tag:'chat',src:'session-logs/option-b-grouped-turns/index.html'},
  {k:'c',name:'Structured Stream',tag:'dense',src:'session-logs/option-c-structured-stream/index.html'}
];
const root=document.documentElement, tb=document.getElementById('theme'), grid=document.getElementById('grid'), chips=document.getElementById('chips');
const SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>';
const MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
const ext='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6M10 14 21 3M21 14v7H3V3h7"/></svg>';
let theme=(()=>{try{const u=new URLSearchParams(location.search).get('theme');if(u==='dark'||u==='light')return u;return localStorage.swarmMock||'light'}catch(e){return 'light'}})();
const visible={d:true,a:true,b:true,c:true};
function applyTheme(){root.classList.toggle('dark',theme==='dark');tb.innerHTML=theme==='dark'?SUN:MOON;try{localStorage.swarmMock=theme}catch(e){}}
function build(){
  grid.innerHTML=OPTS.map(o=>'<div class="pane'+(o.feat?' feat':'')+'" data-k="'+o.k+'"><div class="pane-head"><span class="letter">'+o.k.toUpperCase()+'</span><div><h3>'+o.name+'</h3></div><span class="tag">'+o.tag+'</span><a class="full" title="Open full" href="'+o.src+'?theme='+theme+'">'+ext+'</a></div><iframe data-k="'+o.k+'" title="'+o.name+'" loading="eager" src="'+o.src+'?embed=1&n=6&theme='+theme+'"></iframe></div>').join('');
  chips.innerHTML=OPTS.map(o=>'<button data-k="'+o.k+'" aria-pressed="true">'+o.k.toUpperCase()+'</button>').join('');
  chips.querySelectorAll('button').forEach(b=>b.onclick=()=>{const k=b.dataset.k;visible[k]=!visible[k];b.setAttribute('aria-pressed',String(visible[k]));grid.querySelector('.pane[data-k="'+k+'"]').classList.toggle('hidden',!visible[k]);});
}
function broadcast(action,value){grid.querySelectorAll('iframe').forEach(f=>{try{f.contentWindow.postMessage({__swarmDemo:true,action:action,value:value},'*');}catch(e){}});}
document.getElementById('c-next').onclick=()=>broadcast('next');
document.getElementById('c-all').onclick=()=>broadcast('all');
document.getElementById('c-reset').onclick=()=>broadcast('reset');
tb.onclick=()=>{theme=theme==='dark'?'light':'dark';applyTheme();broadcast('theme',theme);grid.querySelectorAll('.full').forEach((a,i)=>a.setAttribute('href',OPTS[i].src+'?theme='+theme));};
const PLAY='<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 5v14l11-7z"/></svg>';
const PAUSE='<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 5h3.4v14H7zM13.6 5H17v14h-3.4z"/></svg>';
const cplay=document.getElementById('c-play'), cspeed=document.getElementById('c-speed');
let ctimer=null, cticks=0;
function cStop(){if(ctimer){clearInterval(ctimer);ctimer=null;}cplay.innerHTML=PLAY;}
function cStart(){if(ctimer)return;cplay.innerHTML=PAUSE;cticks=0;ctimer=setInterval(()=>{broadcast('next');if(++cticks>44)cStop();},Math.max(60,Math.round(1000/(+cspeed.value||2))));}
cplay.innerHTML=PLAY;cplay.onclick=()=>ctimer?cStop():cStart();
cspeed.onchange=()=>{if(ctimer){cStop();cStart();}};
applyTheme();build();
</script>
</body>
</html>
