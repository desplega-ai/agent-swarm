## oauth2-proxy configuration for Agent Swarm
##
## Mode 1 — oauth2-proxy quickstart (reverse-proxy gate in front of the dashboard)
## Mode 3 — add pass_user_headers=true for trusted-header mode (per-user attribution)
##
## Usage:
##   1. Copy this file alongside your docker-compose.yml
##   2. Fill in YOUR_IDP, YOUR_OIDC_CLIENT_ID, YOUR_OIDC_CLIENT_SECRET, etc.
##   3. Add the oauth2-proxy service to docker-compose.yml (see examples/sso/docker-compose.sso.yml)
##
## Full config reference: https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/

# ── Provider ────────────────────────────────────────────────────────────────────
provider      = "oidc"

# Replace with your IdP's OIDC discovery URL:
#   Okta:     https://your-org.okta.com
#   Azure AD: https://login.microsoftonline.com/YOUR_TENANT_ID/v2.0
#   Google:   https://accounts.google.com
#   Keycloak: http://keycloak:8080/realms/YOUR_REALM
oidc_issuer_url = "https://YOUR_IDP.example.com"

client_id     = "YOUR_OIDC_CLIENT_ID"
client_secret = "YOUR_OIDC_CLIENT_SECRET"

# Scopes to request from the IdP.
# Add "groups" if your IdP supports a groups claim and you plan to use Mode 3
# with group-based access lists.
scope = "openid email profile"

# ── Callback ────────────────────────────────────────────────────────────────────
# Must match the redirect URI registered in your IdP application.
# Replace YOUR_SWARM_HOST with your public hostname or IP:port.
redirect_url = "http://YOUR_SWARM_HOST:4180/oauth2/callback"

# ── Upstream (the swarm API/UI) ──────────────────────────────────────────────────
# Internal address of the agent-swarm API service.
# If running in the same docker-compose network, use the service name:
upstreams = ["http://api:3013"]

# ── Cookie ──────────────────────────────────────────────────────────────────────
# Generate with: openssl rand -base64 32
cookie_secret = "YOUR_32_BYTE_BASE64_SECRET"

# Set to true when serving over HTTPS
cookie_secure = false

cookie_name   = "_oauth2_proxy"

# Session lifetime (default 168h = 7 days).
# cookie_expire = "168h"

# ── Network ─────────────────────────────────────────────────────────────────────
http_address = "0.0.0.0:4180"

# ── Email allow-list (optional) ─────────────────────────────────────────────────
# Restrict logins to specific email domains:
# email_domains = ["yourcompany.com"]

# Allow all authenticated users (remove or comment to restrict by domain):
email_domains = ["*"]

# ── Trusted-header mode (Mode 3 addition) ───────────────────────────────────────
# Uncomment these lines to enable per-user identity forwarding to the swarm API.
# Requires SSO_TRUSTED_HEADER support in the swarm API (proposed — see docs).
#
# pass_user_headers = true    # forward X-Forwarded-User / X-Forwarded-Email
# pass_access_token = false   # keep IdP access token off the wire
# set_xauthrequest  = true    # enable X-Auth-Request-* headers

# ── Logging ──────────────────────────────────────────────────────────────────────
request_logging = true
auth_logging    = true
